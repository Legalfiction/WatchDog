name: Build Barkr APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject native Android bestanden
        run: |
          mkdir -p android/app/src/main/java/nl/barkr/app
          cp BarkrService.java    android/app/src/main/java/nl/barkr/app/BarkrService.java
          cp BootReceiver.java    android/app/src/main/java/nl/barkr/app/BootReceiver.java
          cp MainActivity.java    android/app/src/main/java/nl/barkr/app/MainActivity.java
          cp AndroidManifest.xml  android/app/src/main/AndroidManifest.xml
          echo "✅ Native bestanden geïnjecteerd"

      - name: Installeer ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Genereer app iconen uit logo.png
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          convert public/logo.png -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert public/logo.png -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert public/logo.png -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert public/logo.png -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert public/logo.png -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert public/logo.png -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert public/logo.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert public/logo.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert public/logo.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert public/logo.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          echo "✅ Iconen gegenereerd uit logo.png"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: barkr-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
