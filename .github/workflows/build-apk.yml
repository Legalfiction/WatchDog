name: Build Barkr APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject native Android bestanden
        run: |
          mkdir -p android/app/src/main/java/nl/barkr/app
          cp BarkrService.java    android/app/src/main/java/nl/barkr/app/BarkrService.java
          cp BootReceiver.java    android/app/src/main/java/nl/barkr/app/BootReceiver.java
          cp MainActivity.java    android/app/src/main/java/nl/barkr/app/MainActivity.java
          cp AndroidManifest.xml  android/app/src/main/AndroidManifest.xml
          echo "✅ Native bestanden geïnjecteerd"

      - name: Installeer ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Verifieer logo en genereer iconen
        run: |
          echo "=== LOGO VERIFICATIE ==="
          ls -la *.png 2>/dev/null || echo "Geen PNG in root"
          ls -la public/*.png 2>/dev/null || echo "Geen PNG in public/"

          if [ -f "logoApp.png" ]; then
            LOGO="logoApp.png"
          elif [ -f "logo.png" ]; then
            LOGO="logo.png"
          elif [ -f "public/logo.png" ]; then
            LOGO="public/logo.png"
          else
            echo "❌ FOUT: geen logo bestand gevonden!"
            exit 1
          fi

          echo "✅ Logo gevonden: $LOGO ($(wc -c < $LOGO) bytes)"

          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          convert "$LOGO" -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert "$LOGO" -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert "$LOGO" -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert "$LOGO" -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert "$LOGO" -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert "$LOGO" -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert "$LOGO" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert "$LOGO" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert "$LOGO" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert "$LOGO" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          # Sla preview op voor verificatie
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png /tmp/barkr_preview.png

          echo "=== GEGENEREERDE ICONEN ==="
          ls -la android/app/src/main/res/mipmap-xxxhdpi/
          echo "✅ Alle iconen succesvol gegenereerd"

      - name: Upload icoon preview
        uses: actions/upload-artifact@v4
        with:
          name: barkr-icon-preview
          path: /tmp/barkr_preview.png
          retention-days: 7

      - name: Genereer keystore voor signing
        run: |
          keytool -genkey -v \
            -keystore android/app/barkr-release.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias ${{ secrets.KEY_ALIAS }} \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            -dname "CN=Barkr, OU=Barkr, O=Barkr, L=Netherlands, ST=Netherlands, C=NL"
          echo "✅ Keystore gegenereerd"

      - name: Configureer signing in build.gradle
        run: |
          cat >> android/app/build.gradle << 'EOF'

          android.signingConfigs {
              release {
                  storeFile file("barkr-release.jks")
                  storePassword System.getenv("KEYSTORE_PASSWORD")
                  keyAlias System.getenv("KEY_ALIAS")
                  keyPassword System.getenv("KEY_PASSWORD")
              }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          android.buildTypes.debug.signingConfig = android.signingConfigs.release
          EOF
          echo "✅ Signing geconfigureerd"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build signed APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: barkr-signed-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
